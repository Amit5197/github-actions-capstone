name: reusable build and test

on:
  workflow_call:
    inputs:
      node_version:
        type: number
        required: true
      run_tests:
        type: boolean
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # v4.2.2 release commit
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # v4.2.0 release commit
      - name: Setup Node.js
        uses: actions/setup-node@3922559a99c9461b1125273cd98694af11b953b8
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

       shadow-install:
      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        if: ${{ inputs.run_tests }}
        run: npm test
