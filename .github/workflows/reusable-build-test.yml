name: reusable build and test

on:
  workflow_call:
    inputs:
      node_version:
        type: number
        required: true
      run_tests:
        type: boolean
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@1d2447033dbe9c11016dd81114532dbc5a5c6d50
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        if: ${{ inputs.run_tests }}
        run: npm test
