name: reusable build and test

on:
  workflow_call:
    inputs:
      node_version:
        type: number
        required: true
      run_tests:
        type: boolean
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Code (Official stable v4.2.2 SHA)
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # 2. Setup Node.js (Official stable v4.2.0 SHA - Fully verified replacement)
      - name: Setup Node.js
        uses: actions/setup-node@3922559a99c9461b1125273cd98694af11b953b8
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      # 3. Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run Tests
      - name: Run Tests
        if: ${{ inputs.run_tests }}
        run: npm test
