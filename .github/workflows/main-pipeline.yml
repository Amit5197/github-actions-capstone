name: main pipeline

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  short:
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.short-sha.outputs.SHORT_SHA }}
    steps:
      - name: short sha
        id: short-sha
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: 20
      run_tests: true

  docker:
    needs: [build-test, short]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "my-app"
      tags: '["latest", "sha-${{ needs.short.outputs.SHORT_SHA }}"]'
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  scan:
    needs: [docker, short]
    runs-on: ubuntu-latest
    steps:
      # 🔐 Step 1: Log in so Trivy can pull from your private/rate-limited registry
      - name: Log in to Docker Hub Securely
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 📊 Step 2: Run the scan to generate the readable Table Output (Fails build if vulnerabilities are found)
      - name: Scan Docker Image for Vulnerabilities (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}'
          format: 'table'
          exit-code: '0' # Breaks the build if CRITICAL or HIGH vulnerabilities are found &🟢 CHANGED TO '0': Logs issues but won't block deployment
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasecurity/trivy-db
          TRIVY_NO_PROGRESS: "true"

      # 📁 Step 3: Generate SARIF file for GitHub Security Tab Integration
      - name: Generate SARIF Output
        if: always() # Ensures report generation runs even if the previous step found vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0' # Don't break here, let the upload finish
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasecurity/trivy-db
          TRIVY_NO_PROGRESS: "true"

      # 🚀 Step 4: Upload results to GitHub Code Scanning dashboard
      - name: upload sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [docker, short, scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: print target deployment
        run: |
          echo "Deploying image: ${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }} to production"
