name: main pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  
  short:
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.short-sha.outputs.SHORT_SHA }}
    steps:
      - name: short sha
        id: short-sha
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: 20
      run_tests: true

  docker:
    needs: [build-test, short]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "my-app"
      tags: '["latest", "sha-${{ needs.short.outputs.SHORT_SHA }}"]'
    # FIX 1: Automatically pass down your repository credentials cleanly
    secrets: inherit

  scan:
    needs: [docker, short]
    runs-on: ubuntu-latest
    steps:
      # FIX 2: Swapped aquasecurity/trivy-action@0.35.0 to verified SHA-pin for security policy compliance
      # FIX 3: Point image-ref to secrets context instead of vars context
      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@18f2510ee49f5fcce002447b952458426ef43884
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasecurity/trivy-db
          TRIVY_NO_PROGRESS: "true"
          TRIVY_CACHE_DIR: .trivycache

      # FIX 4: Swapped aquasecurity/trivy-action@master to a fixed SHA-pin
      - name: sarif output
        uses: aquasecurity/trivy-action@18f2510ee49f5fcce002447b952458426ef43884
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      # FIX 5: Swapped github/codeql-action/upload-sarif@v3 to standard stable SHA-pin
      - name: upload sarif
        uses: github/codeql-action/upload-sarif@48ab28a6f5db2aed3be6d8e0518ab93297a9255f
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: [docker, scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: print
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }} to production"
