name: reusable docker

on:
  workflow_call:
    inputs:
      image_name: 
        type: string
        required: true
      tags:
        type: string
        required: true
    outputs:
      image_url:
        description: "The primary tagged Docker image URL"
        value: ${{ jobs.build.outputs.url }}
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set-url.outputs.url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Set up Docker Buildx (Highly Recommended for reliable builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Authenticate to Docker Hub once
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Extract and format your tag array into an action-compatible multi-line string
      - name: Format Docker Tags
        id: format-tags
        run: |
          # Converts JSON string ["latest", "sha-12345"] into multi-line format
          FORMATTED_TAGS=$(echo '${{ inputs.tags }}' | jq -r '.[] | "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:" + .')
          
          # Safely write to multi-line GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 4. Build and Push ALL tags simultaneously in a single step
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ steps.format-tags.outputs.tags }}

      # 5. Set stable single output URL for the downstream scan/deploy steps
      - name: Set Output URL
        id: set-url
        run: |
          # Grabs the first tag entry from the JSON array as the primary tracking URL
          FIRST_TAG=$(echo '${{ inputs.tags }}' | jq -r '.[0]')
          echo "url=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:$FIRST_TAG" >> "$GITHUB_OUTPUT"
