name: reusable docker

on:
  workflow_call:
    inputs:
      image_name: 
        type: string
        required: true
      tags:
        type: string
        required: true
    outputs:
      image_url:
        description: "The primary tagged Docker image URL"
        value: ${{ jobs.build.outputs.url }}
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set-url.outputs.url }}
    steps:
      # CHANGE 1: Swapped actions/checkout@v4 to full SHA
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # CHANGE 2: Swapped docker/setup-buildx-action@v3 to full SHA
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318a742a1855737f099bb2c762c330c1e

      # CHANGE 3: Swapped docker/login-action@v3 to full SHA
      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Extract and format your tag array into an action-compatible multi-line string
      - name: Format Docker Tags
        id: format-tags
        run: |
          # Converts JSON string ["latest", "sha-12345"] into multi-line format
          FORMATTED_TAGS=$(echo '${{ inputs.tags }}' | jq -r '.[] | "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:" + .')
          
          # Safely write to multi-line GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # CHANGE 4: Swapped docker/build-push-action@v5 to full SHA
      - name: Build and Push Docker Image
        uses: docker/build-push-action@ca0597ba7da1d230228b1a4114c45082202246d5
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ steps.format-tags.outputs.tags }}

      # 5. Set stable single output URL for the downstream scan/deploy steps
      - name: Set Output URL
        id: set-url
        run: |
          # Grabs the first tag entry from the JSON array as the primary tracking URL
          FIRST_TAG=$(echo '${{ inputs.tags }}' | jq -r '.[0]')
          echo "url=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:$FIRST_TAG" >> "$GITHUB_OUTPUT"
