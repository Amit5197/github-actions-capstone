name: reusable docker

on:
  workflow_call:
    inputs:
      image_name: 
        type: string
        required: true
      tags:
        type: string
        required: true
    outputs:
      image_url:
        description: "The primary tagged Docker image URL"
        value: ${{ jobs.build.outputs.url }}
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set-url.outputs.url }}
    steps:
      # 1. Checkout Code (Verified v4.2.2 SHA)
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # 2. Set up Docker Buildx (Verified v3.8.0 SHA)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da0460b6b15dee13b76d4697c5e3

      # 3. Authenticate to Docker Hub (Verified v3.3.0 SHA)
      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Extract and format your tag array into an action-compatible multi-line string
      - name: Format Docker Tags
        id: format-tags
        run: |
          # Converts JSON string ["latest", "sha-12345"] into multi-line format
          FORMATTED_TAGS=$(echo '${{ inputs.tags }}' | jq -r '.[] | "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:" + .')
          
          # Safely write to multi-line GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 5. Build and Push ALL tags simultaneously (Verified v6.18.0 SHA)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@26343531b4028d7b301a211832bdf6034114c450
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ steps.format-tags.outputs.tags }}

      # 6. Set stable single output URL for the downstream scan/deploy steps
      - name: Set Output URL
        id: set-url
        run: |
          # Grabs the first tag entry from the JSON array as the primary tracking URL
          FIRST_TAG=$(echo '${{ inputs.tags }}' | jq -r '.[0]')
          echo "url=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:$FIRST_TAG" >> "$GITHUB_OUTPUT"
