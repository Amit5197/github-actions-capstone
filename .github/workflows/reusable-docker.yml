name: reusable docker

on:
  workflow_call:
    inputs:
      image_name: 
        type: string
        required: true
      tags:
        type: string
        required: true
    outputs:
      image_url:
        description: "The primary tagged Docker image URL"
        value: ${{ jobs.build.outputs.url }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set-url.outputs.url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da0460b6b15dee13b76d4697c5e3

      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Format Docker Tags
        id: format-tags
        run: |
          FORMATTED_TAGS=$(echo '${{ inputs.tags }}' | jq -r '.[] | "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:" + .')
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$FORMATTED_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@26343531b4028d7b301a211832bdf6034114c450
        with:
          context: .
          no-cache: true
          push: true
          tags: ${{ steps.format-tags.outputs.tags }}

      - name: Set Output URL
        id: set-url
        run: |
          FIRST_TAG=$(echo '${{ inputs.tags }}' | jq -r '.[0]')
          echo "url=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:$FIRST_TAG" >> "$GITHUB_OUTPUT"
